<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="2nd css" content="=fokir apply">
    <title>FOKIR</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">

        <div class="navbar">
            <div class="logo">Fokir</div>
            <ul class="menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Portfolio</a></li>
                <li><a href="#">Testimonial</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div class="clear"></div>
        </div>

        <div class="text">
            <p>Hello I'm</p>
            <h1>ALEX SMITH</h1>
            <p class="job">
                <span class="typing"></span>
                <span class="cursor">|</span>
            </p>
        </div>

    </div>

    <script>
        const text = ["Professional Web Designer", "Professional Web Developer"];
        let count = 0;
        let index = 0;
        let currentText = '';
        let letter = '';

        (function type() {
            if (count === text.length) {
                count = 0;
            }
            currentText = text[count];
            letter = currentText.slice(0, ++index);
            document.querySelector(".typing").textContent = letter;
            if (letter.length === currentText.length) {
                setTimeout(() => {
                    index = 0;
                    count++;
                    type();
                }, 1500);
            } else {
                setTimeout(type, 150);
            }
        })();
    </script>
</body>

</html>
